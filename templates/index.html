<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard AI - URL Detector</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --accent: #00ff88;
            --danger: #ff3366;
            --warning: #ffaa00;
            --caution: #00aaff;
            --text: #e0e0f0;
            --muted: #666680;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 60px;
        }

        .badge {
            display: inline-block;
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            padding: 6px 16px;
            border-radius: 20px;
            letter-spacing: 3px;
            margin-bottom: 24px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 60%, #00ddff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 1rem;
            font-family: 'Space Mono', monospace;
        }

        /* Input Section */
        .input-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
        }

        .input-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .input-label {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 12px;
            display: block;
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 20px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 14px;
            transition: all 0.3s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.1);
            background: rgba(0,255,136,0.02);
        }

        input[type="text"]::placeholder { color: var(--muted); }

        button.analyze-btn {
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 10px;
            padding: 16px 32px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        button.analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,255,136,0.3);
        }

        button.analyze-btn:active { transform: translateY(0); }

        button.analyze-btn.loading {
            opacity: 0.7;
            cursor: wait;
        }

        /* Examples */
        .examples {
            margin-top: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .examples span {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .example-url {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 10px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .example-url:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Result Section */
        #result {
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .verdict-header {
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            position: relative;
        }

        .verdict-header.danger { background: rgba(255,51,102,0.08); border-bottom: 1px solid rgba(255,51,102,0.2); }
        .verdict-header.warning { background: rgba(255,170,0,0.08); border-bottom: 1px solid rgba(255,170,0,0.2); }
        .verdict-header.caution { background: rgba(0,170,255,0.08); border-bottom: 1px solid rgba(0,170,255,0.2); }
        .verdict-header.safe { background: rgba(0,255,136,0.08); border-bottom: 1px solid rgba(0,255,136,0.2); }

        .verdict-emoji { font-size: 3rem; }

        .verdict-text h2 {
            font-size: 2rem;
            font-weight: 800;
        }

        .danger .verdict-text h2 { color: var(--danger); }
        .warning .verdict-text h2 { color: var(--warning); }
        .caution .verdict-text h2 { color: var(--caution); }
        .safe .verdict-text h2 { color: var(--accent); }

        .verdict-text p {
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            margin-top: 4px;
        }

        /* Score Bar */
        .score-section {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
        }

        .score-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .score-label span {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
        }

        .score-number {
            font-size: 1.5rem;
            font-weight: 800;
            font-family: 'Space Mono', monospace;
        }

        .score-bar {
            height: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 6px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 6px;
            transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0;
        }

        .danger .score-fill { background: linear-gradient(90deg, #ff3366, #ff0033); }
        .warning .score-fill { background: linear-gradient(90deg, #ffaa00, #ff6600); }
        .caution .score-fill { background: linear-gradient(90deg, #00aaff, #0066ff); }
        .safe .score-fill { background: linear-gradient(90deg, #00ff88, #00cc66); }

        /* Reasons */
        .reasons-section {
            padding: 24px 32px;
        }

        .reasons-title {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .reason-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            font-size: 14px;
        }

        .reason-item:last-child { border-bottom: none; }

        .reason-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 5px;
            flex-shrink: 0;
        }

        .red-dot { background: var(--danger); box-shadow: 0 0 8px var(--danger); }
        .green-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* Features Grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }

        .feature-item {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
        }

        .feature-name {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .feature-value {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            font-family: 'Space Mono', monospace;
        }

        /* URL display */
        .analyzed-url {
            padding: 16px 32px;
            border-top: 1px solid var(--border);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            word-break: break-all;
        }

        .analyzed-url strong { color: var(--text); }

        /* Loader */
        .loader {
            display: none;
            text-align: center;
            padding: 60px;
        }

        .loader-ring {
            width: 60px;
            height: 60px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loader p {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            color: var(--muted);
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        @media (max-width: 600px) {
            .input-row { flex-direction: column; }
            .verdict-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="badge">⚡ AI Powered</div>
        <h1>PhishGuard AI</h1>
        <p class="subtitle">// phishing url detector & analyzer</p>
    </header>

    <div class="input-section">
        <label class="input-label">Enter URL to Analyze</label>
        <div class="input-row">
            <input type="text" id="urlInput" placeholder="https://example.com or any URL..." />
            <button class="analyze-btn" onclick="analyzeURL()">🔍 Analyze</button>
        </div>
        <div class="examples">
            <span>Try:</span>
            <span class="example-url" onclick="setExample('https://google.com')">google.com</span>
            <span class="example-url" onclick="setExample('http://paypa1-secure-login.xyz/verify?user=abc&token=xyz&redirect=true')">suspicious URL</span>
            <span class="example-url" onclick="setExample('http://192.168.1.1/login?user=admin')">IP URL</span>
            <span class="example-url" onclick="setExample('http://bit.ly/3xAbc99')">shortened URL</span>
        </div>
    </div>

    <div class="loader" id="loader">
        <div class="loader-ring"></div>
        <p>Analyzing URL, please wait...</p>
    </div>

    <div id="result"></div>

    <footer>
        Built with Python Flask + Rule-based AI Scoring &nbsp;|&nbsp; PhishGuard v1.0
    </footer>
</div>

<script>
    function setExample(url) {
        document.getElementById('urlInput').value = url;
        document.getElementById('urlInput').focus();
    }

    document.getElementById('urlInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') analyzeURL();
    });

    async function analyzeURL() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) {
            alert('Please enter a URL first!');
            return;
        }

        const btn = document.querySelector('.analyze-btn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');

        btn.classList.add('loading');
        btn.textContent = '⏳ Analyzing...';
        loader.style.display = 'block';
        result.style.display = 'none';
        result.innerHTML = '';

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url })
            });

            const data = await response.json();

            if (data.error) {
                alert(data.error);
                return;
            }

            displayResult(data);
        } catch (err) {
            alert('Error aa gaya: ' + err.message);
        } finally {
            btn.classList.remove('loading');
            btn.textContent = '🔍 Analyze';
            loader.style.display = 'none';
        }
    }

    function displayResult(data) {
        const result = document.getElementById('result');
        
        const redReasons = data.reasons.map(r => `
            <div class="reason-item">
                <span class="reason-dot red-dot"></span>
                <span>${r}</span>
            </div>
        `).join('');

        const greenReasons = data.safe_points.map(r => `
            <div class="reason-item">
                <span class="reason-dot green-dot"></span>
                <span>${r}</span>
            </div>
        `).join('');

        const featuresHTML = Object.entries(data.features).map(([k, v]) => `
            <div class="feature-item">
                <div class="feature-name">${k}</div>
                <div class="feature-value">${v}</div>
            </div>
        `).join('');

        result.innerHTML = `
            <div class="result-card">
                <div class="verdict-header ${data.level}">
                    <div class="verdict-emoji">${data.emoji}</div>
                    <div class="verdict-text">
                        <h2>${data.verdict}</h2>
                        <p>Threat Score: ${data.score}/100</p>
                    </div>
                </div>
                
                <div class="score-section ${data.level}">
                    <div class="score-label">
                        <span>Phishing Probability</span>
                        <span class="score-number">${data.score}/100</span>
                    </div>
                    <div class="score-bar">
                        <div class="score-fill" id="scoreFill"></div>
                    </div>
                </div>

                <div class="reasons-section">
                    ${data.reasons.length > 0 ? `
                        <div class="reasons-title">⚠️ Red Flags Found</div>
                        ${redReasons}
                    ` : ''}
                    ${data.safe_points.length > 0 ? `
                        <div class="reasons-title" style="margin-top: 20px">✅ Safe Indicators</div>
                        ${greenReasons}
                    ` : ''}
                </div>

                <div class="features-grid">
                    ${featuresHTML}
                </div>

                <div class="analyzed-url">
                    <strong>Analyzed:</strong> ${escapeHtml(data.url)}
                </div>
            </div>
        `;

        result.style.display = 'block';

        // Animate score bar
        setTimeout(() => {
            document.getElementById('scoreFill').style.width = data.score + '%';
        }, 100);
    }

    function escapeHtml(text) {
        return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
</script>
</body>
</html>
